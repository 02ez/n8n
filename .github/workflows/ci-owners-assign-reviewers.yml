name: 'CI: Owners Assign Reviewers'

# Opt-in reviewer auto-assignment.
#
# When a PR carries the `Auto-assign reviewers` label, requests review from
# every team that owns a changed file (based on .github/OWNERS). Disabled by
# default in forks because it requires the n8n Assistant GitHub App credentials.

on:
  pull_request:
    types:
      - labeled
      - synchronize
      - reopened
    branches:
      - master

jobs:
  assignment-disabled:
    name: Internal reviewer assignment disabled
    if: vars.ENABLE_INTERNAL_REVIEW_AUTOMATION != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Report credential gate
        run: |
          echo 'CI_MODE=fork-safe internal_review_automation=false component=assignment reason=ENABLE_INTERNAL_REVIEW_AUTOMATION_not_true'
          {
            echo '## Internal reviewer assignment skipped'
            echo
            echo 'The n8n Assistant GitHub App credentials are not configured for this fork.'
          } >> "$GITHUB_STEP_SUMMARY"

  assign-reviewers:
    name: Assign reviewers
    # Enabled only when this fork intentionally provisions the n8n Assistant
    # GitHub App credentials. Bot-authored PR behavior remains unchanged.
    if: |
      vars.ENABLE_INTERNAL_REVIEW_AUTOMATION == 'true' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (github.event.pull_request.user.type != 'Bot' ||
       github.event.pull_request.user.login == 'n8n-cat-bot[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ secrets.N8N_ASSISTANT_APP_ID }}
          private-key: ${{ secrets.N8N_ASSISTANT_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: ./.github/actions/setup-nodejs
        with:
          build-command: ''
          install-command: pnpm install --frozen-lockfile --dir ./.github/scripts --ignore-workspace

      - name: Assign reviewer teams
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: node .github/scripts/owners-assign-reviewers.mjs
