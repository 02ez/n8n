name: 'CI: Pull Requests (Fork Safe)'

on:
  pull_request:
  merge_group:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.event.merge_group.head_sha || github.ref }}
  cancel-in-progress: true

jobs:
  ci-mode:
    name: Fork-safe CI configuration
    runs-on: ubuntu-latest
    env:
      RUNNER_PROVIDER: ${{ vars.RUNNER_PROVIDER || 'github' }}
      INTERNAL_NOTIFICATIONS: ${{ vars.ENABLE_INTERNAL_NOTIFICATIONS == 'true' }}
      AI_EVALS: ${{ vars.ENABLE_AI_EVALS == 'true' }}
      IMAGE_PUBLISH: ${{ vars.ENABLE_IMAGE_PUBLISH == 'true' }}
    steps:
      - name: Report CI mode
        run: |
          echo "CI_MODE=fork-safe runner=${RUNNER_PROVIDER} internal_jobs=${INTERNAL_NOTIFICATIONS} ai_evals=${AI_EVALS} image_publish=${IMAGE_PUBLISH}"
          {
            echo '## Fork-safe CI mode'
            echo
            echo '| Setting | Value |'
            echo '| --- | --- |'
            echo "| Runner provider | ${RUNNER_PROVIDER} |"
            echo "| Internal notifications | ${INTERNAL_NOTIFICATIONS} |"
            echo "| AI evaluations | ${AI_EVALS} |"
            echo "| Image publishing | ${IMAGE_PUBLISH} |"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.commit-sha.outputs.sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Capture commit SHA
        id: commit-sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup and build
        uses: ./.github/actions/setup-nodejs
        with:
          build-command: pnpm build

      - name: Check formatting
        run: pnpm format:check

  unit-test:
    name: Unit tests
    needs: build
    uses: ./.github/workflows/test-unit-reusable.yml
    with:
      ref: ${{ needs.build.outputs.commit_sha }}
      collectCoverage: false
    secrets: inherit

  lint:
    name: Lint
    needs: build
    uses: ./.github/workflows/test-linting-reusable.yml
    with:
      ref: ${{ needs.build.outputs.commit_sha }}

  typecheck:
    name: Typecheck
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.build.outputs.commit_sha }}

      - name: Run typecheck
        uses: ./.github/actions/setup-nodejs
        with:
          build-command: pnpm typecheck

  check-packaging:
    name: Check packaging
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.build.outputs.commit_sha }}

      - name: Setup Node.js
        uses: ./.github/actions/setup-nodejs

      - name: Check packaging
        run: pnpm -r pack --dry-run

  required-checks:
    name: Required Checks
    needs: [build, unit-test, lint, typecheck, check-packaging]
    if: always()
    runs-on: ubuntu-latest
    env:
      BUILD_RESULT: ${{ needs.build.result }}
      UNIT_RESULT: ${{ needs.unit-test.result }}
      LINT_RESULT: ${{ needs.lint.result }}
      TYPECHECK_RESULT: ${{ needs.typecheck.result }}
      PACKAGING_RESULT: ${{ needs.check-packaging.result }}
    steps:
      - name: Validate required checks
        run: |
          failed=0
          for entry in \
            "build=${BUILD_RESULT}" \
            "unit=${UNIT_RESULT}" \
            "lint=${LINT_RESULT}" \
            "typecheck=${TYPECHECK_RESULT}" \
            "packaging=${PACKAGING_RESULT}"; do
            name="${entry%%=*}"
            result="${entry#*=}"
            echo "${name}: ${result}"
            if [ "$result" != 'success' ]; then
              failed=1
            fi
          done
          exit "$failed"
